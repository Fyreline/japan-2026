<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="torii-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japan 2026</title>
    <script>
      // Apply the theme class before first paint to avoid a flash of the
      // wrong theme (ARCHITECTURE.md §9). Mirrors src/hooks/useTheme.ts:
      // an explicit localStorage choice wins, otherwise fall back to the OS
      // `prefers-color-scheme` on first visit.
      (function () {
        try {
          var stored = localStorage.getItem('japan-theme');
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
